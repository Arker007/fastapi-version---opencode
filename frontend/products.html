<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products & Stock - InvoiceFlow</title>
  <link rel="stylesheet" href="style.css?v=2.0.6">
  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  
  <div id="page-content" class="hidden">
    <!-- Tab Navigation Headers -->
    <div class="tabs-header">
      <button class="tab-btn active" data-tab="products-tab-content"><i class="fa-solid fa-boxes-stacked"></i> Products List</button>
      <button class="tab-btn" data-tab="categories-tab-content"><i class="fa-solid fa-tags"></i> Category Management</button>
    </div>



    <!-- Tab Content 1: Products List -->
    <div id="products-tab-content" class="tab-content">
      <div class="card products-list-card">
        <div class="card-header-actions">
          <h3><i class="fa-solid fa-boxes-stacked"></i> Products Directory</h3>
          <div class="header-buttons" style="display: flex; gap: 12px; align-items: center;">
            <!-- Dropdown category filter component -->
            <div class="dropdown-wrapper" style="min-width: 180px;">
              <button type="button" class="dropdown-select-btn" id="category-filter-dropdown-toggle">
                <div class="select-btn-left">
                  <i class="fa-solid fa-filter"></i>
                  <span id="active-category-filter-label">All Categories</span>
                </div>
                <i class="fa-solid fa-chevron-down select-btn-arrow"></i>
              </button>
              <div class="dropdown-menu hidden" id="category-filter-dropdown-menu" style="min-width: 180px; max-height: 250px; overflow-y: auto;">
                <!-- Dynamically populated categories -->
              </div>
            </div>

            <button id="btn-add-product-modal" class="btn btn-secondary admin-only hidden">
              <i class="fa-solid fa-plus"></i> New Product
            </button>
          </div>

        </div>
        <div class="table-container large-viewport" style="overflow: visible;">
          <table>
            <thead>
              <tr>
                <th>SKU</th>
                <th>Name</th>
                <th>Category</th>
                <th>Price</th>
                <th>GST</th>
                <th>Stock Status</th>
                <th>Min Alert</th>
                <th class="admin-only hidden">Actions</th>
              </tr>
            </thead>
            <tbody id="products-tbody">
              <!-- Dynamic Rows -->
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Tab Content 2: Category Management -->
    <div id="categories-tab-content" class="tab-content hidden">
      <div class="inventory-row">
        <!-- Left: Category Add Form (Admin Only) -->
        <div class="card category-card admin-only hidden">
          <h3><i class="fa-solid fa-tags"></i> Add Category</h3>
          <form id="category-form">
            <div class="input-group">
              <label for="cat-name">Category Name</label>
              <input type="text" id="cat-name" required placeholder="e.g. Peripherals">
            </div>
            <div class="input-group">
              <label for="cat-desc">Description</label>
              <textarea id="cat-desc" rows="3" placeholder="Category details..."></textarea>
            </div>
            <button type="submit" class="btn btn-secondary btn-block">Add Category</button>
          </form>
        </div>

        <!-- Right: Categories List Table -->
        <div class="card categories-list-card">
          <h3><i class="fa-solid fa-tags"></i> Existing Categories</h3>
          <div class="table-container" style="overflow: visible;">
            <table>
              <thead>
                <tr>
                  <th>Category Name</th>
                  <th>Description</th>
                  <th class="admin-only hidden">Actions</th>
                </tr>
              </thead>
              <tbody id="categories-tbody">
                <!-- Dynamic Rows -->
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <!-- ADD/EDIT PRODUCT MODAL -->
    <modal-dialog modal-id="product-modal" title="Add New Product" icon="fa-box-open" title-id="product-modal-title">
      <form id="product-form">
        <input type="hidden" id="product-id">
        <div class="input-group">
          <label for="prod-name">Product Name *</label>
          <input type="text" id="prod-name" required placeholder="e.g. Wireless Mouse">
        </div>
        <div class="grid-2-col">
          <div class="input-group">
            <label for="prod-sku">SKU Code (Auto-generates if blank)</label>
            <input type="text" id="prod-sku" placeholder="e.g. SKU-ELEC-001">
          </div>
          <div class="input-group">
            <label>Category</label>
            <div class="dropdown-wrapper w-full">
              <div class="button-split-group">
                <button type="button" class="split-btn-main" id="btn-category-indicator">
                  <span id="active-category-label">-- No Category --</span>
                </button>
                <button type="button" class="split-btn-arrow" id="category-dropdown-toggle">
                  <i class="fa-solid fa-chevron-down"></i>
                </button>
              </div>
              <input type="hidden" id="prod-category-id" value="">
              <div class="dropdown-menu hidden" id="category-dropdown-menu" style="max-height: 180px; overflow-y: auto;">
                <!-- Dynamic options -->
              </div>
            </div>
          </div>
        </div>
        <div class="grid-2-col">
          <div class="input-group">
            <label for="prod-price">Price (₹) *</label>
            <input type="number" id="prod-price" step="0.01" required min="0">
          </div>
          <div class="input-group">
            <label for="prod-gst-rate">GST Rate (%) *</label>
            <select id="prod-gst-rate" required>
              <option value="0">0% (GST Exempt)</option>
              <option value="5">5%</option>
              <option value="12">12%</option>
              <option value="18" selected>18% (Standard)</option>
              <option value="28">28%</option>
            </select>
          </div>
        </div>
        <div class="grid-2-col">
          <div class="input-group">
            <label for="prod-stock">Initial Stock *</label>
            <input type="number" id="prod-stock" required min="0">
          </div>
          <div class="input-group">
            <label for="prod-min-stock">Min Stock Alert</label>
            <input type="number" id="prod-min-stock" value="5" min="0">
          </div>
        </div>
        <div class="input-group">
          <label for="prod-location">Storage Location *</label>
          <select id="prod-location" required>
            <option value="storefront">Storefront</option>
            <option value="warehouse">Warehouse</option>
          </select>
        </div>
        <div class="input-group">
          <label for="prod-desc">Description</label>
          <textarea id="prod-desc" rows="3" placeholder="Brief technical details..."></textarea>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-outline btn-close-modal">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Product</button>
        </div>
      </form>
    </modal-dialog>

    <!-- EDIT CATEGORY MODAL -->
    <modal-dialog modal-id="category-modal" title="Edit Category" icon="fa-tags" title-id="category-modal-title">
      <form id="category-edit-form">
        <input type="hidden" id="edit-cat-id">
        <div class="input-group">
          <label for="edit-cat-name">Category Name</label>
          <input type="text" id="edit-cat-name" required placeholder="e.g. Peripherals">
        </div>
        <div class="input-group">
          <label for="edit-cat-desc">Description</label>
          <textarea id="edit-cat-desc" rows="3" placeholder="Category details..."></textarea>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-outline btn-close-modal">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Category</button>
        </div>
      </form>
    </modal-dialog>

  </div>


  <script src="common.js?v=2.0.6"></script>
  <script src="products.js?v=2.0.6"></script>
</body>
</html>
