<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>System Logs - InvoiceFlow</title>
  <link rel="stylesheet" href="style.css?v=2.0.6">
  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  
  <div id="page-content" class="hidden">
    <div class="card table-card">
      <h3><i class="fa-solid fa-shield-halved"></i> Security & Operations Audit Logs</h3>
      <div class="table-container scrollable-table large-viewport">
        <table>
          <thead>
            <tr>
              <th>Timestamp</th>
              <th>User</th>
              <th>Action</th>
              <th>Details</th>
            </tr>
          </thead>
          <tbody id="logs-tbody">
            <!-- Dynamic Rows -->
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="common.js?v=2.0.6"></script>
  <script src="logs.js?v=2.0.6"></script>
</body>
</html>
