<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - InvoiceFlow</title>
  <link rel="stylesheet" href="/css/style.css">
  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="login-body-layout">
  
  <div id="login-container" class="login-wrapper">
    <div class="login-card">
      <div class="login-header">
        <div id="login-logo-container" class="login-logo-box hidden"></div>
        <h2>Sign In to Account</h2>
        <p>Access your billing & inventory dashboard</p>
      </div>
      <form id="login-form">
        <div class="form-grid" style="grid-template-columns: 1fr; gap: 16px; margin-bottom: 20px;">
          <div class="input-group">
            <label for="login-username">Username</label>
            <input type="text" id="login-username" placeholder="Enter username" required autocomplete="username">
          </div>
          <div class="input-group">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" placeholder="Enter password" required autocomplete="current-password">
          </div>
        </div>
        <div id="login-error" class="error-msg hidden">
          <i class="fa-solid fa-triangle-exclamation"></i> <span id="error-text">Invalid username or password</span>
        </div>
        <button type="submit" class="btn btn-primary btn-block">
          <span>Log In</span> <i class="fa-solid fa-arrow-right-to-bracket"></i>
        </button>
      </form>
      <div class="login-footer">
        <p>BCA Final Project - Vishal Sharma</p>
      </div>
    </div>
  </div>

  <script src="/js/common.js?v=2.0.6"></script>
  <script src="/js/views/login.js?v=2.0.6"></script>
</body>
</html>
