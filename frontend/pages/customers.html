<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customers CRM - InvoiceFlow</title>
  <link rel="stylesheet" href="/css/style.css">
  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  
  <div id="page-content" class="hidden">
    <div class="card table-card">
      <div class="card-header-actions">
        <h3><i class="fa-solid fa-users"></i> Customers Registry</h3>
        <div style="display: flex; align-items: center; gap: 12px;">
          <search-bar input-id="customer-search" placeholder="Search customers..." style="max-width: 300px;"></search-bar>
          <button id="btn-add-customer-modal" class="btn btn-secondary">
            <i class="fa-solid fa-user-plus"></i> Register Customer
          </button>
        </div>
      </div>
      <div class="table-container" style="overflow: visible;">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Phone</th>
              <th>Email</th>
              <th>Address</th>
              <th>Reg Date</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="customers-tbody">
            <!-- Dynamic Rows -->
          </tbody>
        </table>
      </div>
    </div>

    <!-- REGISTER/EDIT CUSTOMER MODAL -->
    <modal-dialog modal-id="customer-modal" title="Register Customer" icon="fa-user-plus" title-id="customer-modal-title">
      <form id="customer-form">
        <input type="hidden" id="customer-id">
        <div class="input-group">
          <label for="cust-name">Name</label>
          <input type="text" id="cust-name" required placeholder="Full Name">
        </div>
        <div class="input-group">
          <label for="cust-phone">Phone Number *</label>
          <input type="tel" id="cust-phone" required placeholder="10-digit Mobile" pattern="[0-9]{10}">
        </div>
        <div class="input-group">
          <label for="cust-email">Email Address</label>
          <input type="email" id="cust-email" placeholder="example@mail.com">
        </div>
        <div class="input-group">
          <label for="cust-address">Billing Address</label>
          <textarea id="cust-address" rows="3" placeholder="Complete address detail..."></textarea>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-outline btn-close-modal">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Customer</button>
        </div>
      </form>
    </modal-dialog>

    <!-- CUSTOMER HISTORY MODAL -->
    <modal-dialog modal-id="customer-history-modal" title="Customer Purchase History" icon="fa-clock-rotate-left">
      <h4 id="history-customer-name">Customer: Loading...</h4>
      <div class="table-container scrollable-table">
        <table>
          <thead>
            <tr>
              <th>Invoice #</th>
              <th>Date</th>
              <th>Amount Paid</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="history-tbody">
            <!-- Dynamic Rows -->
          </tbody>
        </table>
      </div>
      <div class="modal-actions" style="padding: 24px 0 0 0; border-top: 1px solid var(--glass-border); margin-top: 20px;">
        <button type="button" class="btn btn-outline btn-close-modal">Close</button>
      </div>
    </modal-dialog>
  </div>

  <script src="/js/common.js?v=2.0.6"></script>
  <script src="/js/views/customers.js?v=2.0.6"></script>
</body>
</html>
