<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invoice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #fff;
      color: #1e293b;
      padding: 40px;
      font-family: 'Inter', sans-serif;
    }

    .print-area {
      max-width: 800px;
      margin: auto;
      background: #fff;
      color: #1e293b;
    }

    .hidden { display: none !important; }

    .print-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .print-brand-wrapper {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .print-logo-box img {
      max-height: 48px;
      max-width: 48px;
      object-fit: contain;
      border-radius: 6px;
    }

    .print-company h2 {
      font-size: 1.6rem;
      color: #4f46e5;
      margin-bottom: 6px;
    }

    .print-company p {
      font-size: 0.85rem;
      color: #475569;
      line-height: 1.4;
    }

    .print-invoice-meta { text-align: right; }

    .print-invoice-meta h1 {
      font-size: 2.2rem;
      color: #0f172a;
      margin-bottom: 10px;
    }

    .print-invoice-meta p {
      font-size: 0.9rem;
      color: #475569;
      margin-bottom: 4px;
    }

    .print-divider {
      border: 0;
      height: 2px;
      background: #e2e8f0;
      margin: 30px 0;
    }

    .print-billing-details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      margin-bottom: 40px;
    }

    .print-billing-details h3 {
      font-size: 1rem;
      color: #0f172a;
      margin-bottom: 12px;
      border-bottom: 1px solid #e2e8f0;
      padding-bottom: 6px;
    }

    .print-billing-details p {
      font-size: 0.85rem;
      color: #475569;
      margin-bottom: 6px;
    }

    .print-items-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 30px;
    }

    .print-items-table th {
      background: #f8fafc;
      color: #475569;
      border-bottom: 2px solid #cbd5e1;
      padding: 10px;
      text-align: left;
      font-size: 0.85rem;
    }

    .print-items-table td {
      color: #334155;
      border-bottom: 1px solid #e2e8f0;
      padding: 12px 10px;
      font-size: 0.85rem;
    }

    .print-totals-box {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 20px;
      margin-bottom: 40px;
    }

    .totals-col p {
      font-size: 0.85rem;
      color: #475569;
      margin-bottom: 8px;
    }

    .totals-col.text-right p {
      font-size: 0.9rem;
      color: #334155;
      margin-bottom: 8px;
      text-align: right;
    }

    .totals-col.text-right hr {
      border: 0;
      height: 1px;
      background: #cbd5e1;
      margin: 10px 0;
    }

    .totals-col.text-right h2 {
      font-size: 1.4rem;
      color: #0f172a;
      text-align: right;
    }

    .print-footer {
      text-align: center;
      border-top: 1px solid #e2e8f0;
      padding-top: 20px;
      font-size: 0.8rem;
      color: #64748b;
    }

    .print-footer p { margin-bottom: 4px; }

    .status-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    code {
      font-family: monospace;
      background: #f1f5f9;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.8rem;
    }

    @media print {
      body { padding: 0; }
    }
  </style>
</head>
<body>
  <div id="invoice-slot"></div>
</body>
</html>
