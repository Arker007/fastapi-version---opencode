<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Invoice - InvoiceFlow</title>
  <link rel="stylesheet" href="style.css?v=2.0.6">
  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  
  <div id="page-content" class="hidden">
    <div class="billing-grid">
      <!-- Left Side: Add Items Form -->
      <div class="card billing-form-card">
        <h3><i class="fa-solid fa-cart-plus"></i> Select Products</h3>
        
        <div class="product-selector-group">
          <div class="input-group">
            <label for="billing-product-select">Product</label>
            <select id="billing-product-select">
              <option value="">-- Choose Product --</option>
            </select>
          </div>
          
          <div class="billing-selectors-row">
            <div class="input-group">
              <label for="billing-qty">Quantity</label>
              <input type="number" id="billing-qty" value="1" min="1">
            </div>
            <div class="input-group">
              <label>Stock Available</label>
              <div class="info-badge" id="billing-stock-display">-</div>
            </div>
            <div class="input-group">
              <label>Price</label>
              <div class="info-badge" id="billing-price-display">₹0.00</div>
            </div>
          </div>

          <button id="btn-add-item" class="btn btn-secondary btn-block">
            <i class="fa-solid fa-plus"></i> Add Item
          </button>
        </div>

        <hr class="divider">

        <!-- Customer Selection / Add -->
        <h3><i class="fa-solid fa-user-tag"></i> Customer Details</h3>
        <div class="customer-selection-group">
          <div class="input-group">
            <label for="billing-customer-select">Select Customer</label>
            <select id="billing-customer-select">
              <option value="">-- Guest Customer --</option>
            </select>
          </div>
          <div class="center-text">or</div>
          <button id="btn-quick-add-customer" class="btn btn-outline btn-block">
            <i class="fa-solid fa-user-plus"></i> Create New Customer
          </button>
        </div>
      </div>

      <!-- Right Side: Invoice Calculator -->
      <div class="card billing-cart-card">
        <h3><i class="fa-solid fa-file-invoice"></i> New Invoice</h3>
        
        <div class="cart-items-table scrollable-table">
          <table>
            <thead>
              <tr>
                <th>Product</th>
                <th>Qty</th>
                <th>Price</th>
                <th>Total</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="cart-tbody">
              <!-- Dynamic Rows -->
            </tbody>
          </table>
        </div>

        <div class="billing-summary">
          <div class="summary-line">
            <span>Subtotal</span>
            <span id="bill-subtotal">₹0.00</span>
          </div>
          <div class="summary-line inline-input">
            <span>Discount (₹)</span>
            <input type="number" id="bill-discount" value="0" min="0">
          </div>
          <div class="summary-line inline-input">
            <span>GST Tax (Computed)</span>
            <input type="text" id="bill-gst" readonly value="₹0.00" style="text-align: right; background: transparent; border: none; box-shadow: none; pointer-events: none; width: 120px; font-weight: 500; color: var(--text-main);">
          </div>
          <hr class="summary-divider">
          <div class="summary-line total-line">
            <span>Total Amount</span>
            <span id="bill-total">₹0.00</span>
          </div>
        </div>

        <div class="payment-setup">
          <div class="input-group">
            <label>Payment Method</label>
            <div class="dropdown-wrapper w-full">
              <div class="button-split-group">
                <button type="button" class="split-btn-main" id="btn-payment-indicator">
                  <i class="fa-solid fa-money-bill-wave"></i> <span id="active-payment-label">Cash</span>
                </button>
                <button type="button" class="split-btn-arrow" id="payment-dropdown-toggle">
                  <i class="fa-solid fa-chevron-down"></i>
                </button>
              </div>

              <div class="dropdown-menu hidden" id="payment-dropdown-menu">
                <button type="button" class="dropdown-item active" data-payment="cash">
                  <i class="fa-solid fa-money-bill-wave"></i> Cash
                </button>
                <button type="button" class="dropdown-item" data-payment="upi">
                  <i class="fa-solid fa-qrcode"></i> UPI / QR Code
                </button>
                <button type="button" class="dropdown-item" data-payment="card">
                  <i class="fa-solid fa-credit-card"></i> Debit/Credit Card
                </button>
              </div>
            </div>
          </div>
          <div class="input-group hidden" id="transaction-ref-group">
            <label for="bill-ref">Transaction ID / Ref</label>
            <input type="text" id="bill-ref" placeholder="Enter Ref #">
          </div>
        </div>

        <button id="btn-checkout" class="btn btn-primary btn-block btn-lg">
          <i class="fa-solid fa-file-invoice-dollar"></i> Generate Invoice & Pay
        </button>
      </div>
    </div>

    <!-- QUICK ADD CUSTOMER MODAL -->
    <modal-dialog modal-id="customer-modal" title="Register Customer" icon="fa-user-plus" title-id="customer-modal-title">
      <form id="customer-form">
        <input type="hidden" id="customer-id">
        <div class="input-group">
          <label for="cust-name">Name</label>
          <input type="text" id="cust-name" required placeholder="Full Name">
        </div>
        <div class="input-group">
          <label for="cust-phone">Phone Number *</label>
          <input type="tel" id="cust-phone" required placeholder="10-digit Mobile" pattern="[0-9]{10}">
        </div>
        <div class="input-group">
          <label for="cust-email">Email Address</label>
          <input type="email" id="cust-email" placeholder="example@mail.com">
        </div>
        <div class="input-group">
          <label for="cust-address">Billing Address</label>
          <textarea id="cust-address" rows="3" placeholder="Complete address detail..."></textarea>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-outline btn-close-modal">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Customer</button>
        </div>
      </form>
    </modal-dialog>
  </div>

  <script src="common.js?v=2.0.6"></script>
  <script src="billing.js?v=2.0.6"></script>
</body>
</html>
